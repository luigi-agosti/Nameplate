name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.0.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Package app (ad-hoc signed)
        run: APP_IDENTITY="-" ./Scripts/package_app.sh release
